services:
  # 1. PostgreSQL (Provider)
  postgres:
    image: postgres:16-alpine
    container_name: core-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Local
  redis:
    image: redis:7-alpine
    container_name: core-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

  # 3. Your Minimal API (Sample Project)
  minimal-api:
    container_name: minimal-test-api
    build:
      context: ../.. 
      dockerfile: samples/Minimal.Test.Api/Dockerfile
    ports:
      - "5185:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # OpenTelemetry Configuration
      - OpenTelemetry__Tracing__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetry__Metrics__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetry__Logging__OtlpEndpoint=http://otel-collector:4317
      - OpenTelemetry__Metrics__Enabled=true
      - OpenTelemetry__Tracing__Enabled=true
      - OpenTelemetry__Logging__Enabled=true
      # List of meters to instrument (The 0 indicates the first item in the list)
      - OpenTelemetry__Metrics__Meters__0=CoreSystem.Idempotency

      # Idempotency Configuration (This was missing)
      - Idempotency__Enabled=true
      - Idempotency__Provider=${IDEMPOTENCY_PROVIDER}
      - Idempotency__HeaderName=X-Idempotency-Key
      - Idempotency__Expiration=24:00:00
      - Idempotency__MeterName=CoreSystem.Idempotency

      # Connection Strings
      - ConnectionStrings__Idempotency=${IDEMPOTENCY_CONNECTION}

      # Configure which HTTP methods should be considered for idempotency (This was missing)
      - Idempotency__AllowedMethods__0=POST
      - Idempotency__AllowedMethods__1=PUT
      - Idempotency__AllowedMethods__2=DELETE
    depends_on:
      - otel-collector
      - postgres
      - redis

  # 4. The Collector
  otel-collector:
    container_name: core-otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yml:/etc/otel-col/config.yml
    command: ["--config=/etc/otel-col/config.yml"]
    ports:
      - "4317:4317" # Receive gRPC from the Minimal API
      - "8889:8889" # Exhibit metrics for Prometheus
    depends_on:
      - jaeger

  # 5. Jaeger
  jaeger:
    container_name: core-jaeger
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI

  # 6. Prometheus
  prometheus:
    container_name: core-prometheus
    image: prom/prometheus:latest
    volumes:
      # Adjusted path to match the physical 'samples' folder
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 7. Grafana
  grafana:
    container_name: core-grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning