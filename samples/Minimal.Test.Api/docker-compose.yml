services:
  # 1. Your Minimal API (Sample Project)
  minimal-api:
    container_name: minimal-test-api
    build:
      context: ../.. 
      dockerfile: samples/Minimal.Test.Api/Dockerfile
    ports:
      - "5185:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Overriding settings for Docker network (using service names)
      - OpenTelemetry__Tracing__Enabled=true
      - OpenTelemetry__Tracing__OtlpEndpoint=http://jaeger:4317
      - OpenTelemetry__Metrics__Enabled=true
      - OpenTelemetry__Logging__Enabled=true
      - OpenTelemetry__Logging__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - jaeger
      - prometheus

  # 2. Jaeger (Tracing)
  jaeger:
    container_name: core-jaeger
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC endpoint

  # 3. Prometheus (Metrics)
  prometheus:
    container_name: core-prometheus
    image: prom/prometheus:latest
    volumes:
      # Adjusted path to match the physical 'samples' folder
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 4. Grafana (Dashboards)
  grafana:
    container_name: core-grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin